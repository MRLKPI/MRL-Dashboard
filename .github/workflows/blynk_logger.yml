name: Log Blynk V0 Data

on:
  schedule:
    # Runs at :54 every hour, 24/7 (UTC times — see note below)
    # 5:55 AM AEST  = 19:55 UTC (previous day, AEST is UTC+10)
    # 5:55 AM AEDT  = 18:55 UTC (previous day, AEDT is UTC+11, during daylight saving)
    # Adjust the hour below to match your timezone offset.
    # Format: '55 <UTC_HOUR> * * *' for a specific hour, or '55 * * * *' for every hour.
    - cron: '55 * * * *'   # ← every hour at :55 (all day). Change to e.g. '55 19 * * *' for once a day.
  workflow_dispatch:        # allows manual trigger from GitHub Actions UI

jobs:
  log-blynk:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to push the updated CSV back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Blynk V0 pin and append to CSV
        env:
          BLYNK_TOKEN: ${{ secrets.BLYNK_TOKEN }}
        run: |
          # ── Config ────────────────────────────────────────────────────────
          PIN="V0"                          # Change to your virtual pin, e.g. V1, V2
          CSV_FILE="data/blynk_log.csv"     # Path inside your repo
          BLYNK_SERVER="blynk.cloud"        # or your self-hosted server
          # ──────────────────────────────────────────────────────────────────

          # Fetch value from Blynk HTTP API
          RESPONSE=$(curl -s "https://${BLYNK_SERVER}/external/api/get?token=${BLYNK_TOKEN}&${PIN}")

          # Timestamp in ISO 8601 format (UTC)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Create the CSV file with a header if it doesn't exist yet
          mkdir -p data
          if [ ! -f "$CSV_FILE" ]; then
            echo "timestamp,pin,value" > "$CSV_FILE"
          fi

          # Append the new reading
          echo "${TIMESTAMP},${PIN},${RESPONSE}" >> "$CSV_FILE"

          echo "Logged: ${TIMESTAMP} | ${PIN} = ${RESPONSE}"

      - name: Commit and push updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/blynk_log.csv
          # Only commit if there's actually a change
          git diff --cached --quiet || git commit -m "chore: log Blynk ${PIN} at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
