<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPI DASHBOARD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #87CEEB;
      font-family: 'Inter', sans-serif;
      color: #1a2a3a;
    }

    /* ── Lock Screen ── */
    #lock-screen {
      position: fixed; inset: 0;
      background: #87CEEB;
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }

    .lock-box {
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 340px;
      text-align: center;
      backdrop-filter: blur(6px);
    }

    .lock-icon {
      width: 60px; height: 60px;
      background: rgba(13,42,64,0.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.8rem;
    }

    .lock-title {
      font-size: 1.6rem; font-weight: 600; color: #0d2a40;
      margin-bottom: 0.3rem;
    }

    .lock-sub {
      font-size: 0.95rem; color: #2a5a7a; margin-bottom: 1.8rem;
    }

    .lock-input {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 1.15rem;
      padding: 0.7rem 1rem;
      border: 1.5px solid #5a9abf;
      border-radius: 10px;
      background: rgba(255,255,255,0.7);
      color: #0d2a40;
      outline: none;
      margin-bottom: 0.9rem;
      letter-spacing: 0.15em;
      text-align: center;
      transition: border-color 0.15s;
    }
    .lock-input:focus { border-color: #0d2a40; }
    .lock-input.error { border-color: #E24B4A; animation: shake 0.3s ease; }

    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      25%     { transform: translateX(-6px); }
      75%     { transform: translateX(6px); }
    }

    .lock-btn {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem; font-weight: 600;
      padding: 0.7rem 1rem;
      background: #0d2a40;
      color: #fff;
      border: none; border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .lock-btn:hover { background: #185F80; }

    .lock-error {
      font-size: 0.9rem; color: #E24B4A;
      margin-top: 0.8rem; min-height: 1.2em;
    }

    /* ── Dashboard ── */
    #dashboard { display: none; }

    .page {
      width: 100vw; height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 2.5vh 3vw;
      gap: 2.5vh;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .dash-title { font-size: 2.6vw; font-weight: 600; color: #0d2a40; line-height: 1.1; }
    .dash-sub { font-size: 1.1vw; color: #2a5a7a; margin-top: 4px; }
    .header-right { display: flex; align-items: center; gap: 1.2vw; }
    .status-row { display: flex; align-items: center; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
    .dot.err { background: #E24B4A; }
    .st-txt { font-size: 1.1vw; color: #2a5a7a; }
    .refresh-btn {
      font-size: 1.1vw; font-family: 'Inter', sans-serif;
      color: #0d2a40;
      border: 1px solid #5a9abf; background: rgba(255,255,255,0.3);
      border-radius: 8px; padding: 0.5vh 1.2vw; cursor: pointer;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.55); }

    /* ── Gauges ── */
    .gauges-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 2vw;
      align-items: stretch;
    }

    .card {
      background: #c8c8c8;
      border: 1px solid #a8a8a8;
      border-radius: 16px;
      padding: 2.5vh 2vw;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center;
    }

    .card-label {
      font-size: 1.2vw; font-weight: 600; color: #3a3a3a;
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 1vh; align-self: flex-start;
    }

    .gauge-wrap { width: 100%; max-width: 340px; }

    .gauge-val {
      font-size: 4.8vw; font-weight: 600; color: #1a1a1a;
      margin-top: 1vh; line-height: 1;
    }

    /* ── Bottom ── */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2vw;
    }

    .info-card {
      background: #c8c8c8;
      border: 1px solid #a8a8a8;
      border-radius: 16px;
      padding: 2vh 2vw;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 1.5vw;
      overflow: hidden;
    }

    /* Left part: label + big number + unit */
    .info-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex-shrink: 0;
      min-width: 7vw;
    }

    .info-label {
      font-size: 1.2vw; font-weight: 600; color: #3a3a3a;
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 1vh;
      display: flex; align-items: center; gap: 8px;
    }

    .info-val {
      font-size: 4.5vw; font-weight: 600; color: #1a1a1a; line-height: 1;
    }

    .info-unit { font-size: 1.1vw; color: #555; margin-top: 0.8vh; }

    /* Right part: chart */
    .info-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .chart-title {
      font-size: 0.85vw; color: #555; margin-bottom: 0.4vh;
      text-align: center;
    }

    #ndcr-chart-wrap {
      width: 100%;
      flex: 1;
      min-height: 0;
    }

    #ndcr-chart {
      width: 100%;
      height: 100%;
      display: block;
    }

    .chart-no-data {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9vw; color: #888;
      font-style: italic;
    }

    .date-card {
      background: #b8d8e8;
      border: 1px solid #7aaabf;
      border-radius: 16px;
      padding: 2vh 2vw;
      display: flex; flex-direction: column; justify-content: center;
    }

    .date-val {
      font-size: 4vw; font-weight: 600; color: #0d2a40; line-height: 1;
      margin-top: 0.5vh;
    }

    .skeleton {
      display: inline-block; width: 100px; height: 40px;
      background: #a8a8a8; border-radius: 6px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }
  </style>
</head>
<body>

<!-- ── Lock Screen ── -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">KPI Dashboard</div>
    <div class="lock-sub">Enter your access code to continue</div>
    <input
      class="lock-input"
      id="pw-input"
      type="password"
      placeholder="Access code"
      autocomplete="off"
      maxlength="30"
    />
    <button class="lock-btn" onclick="checkPassword()">Unlock Dashboard</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard">
<div class="page">

  <div class="header">
    <div>
      <div class="dash-title">KPI DASHBOARD</div>
      <div class="dash-sub">Auto-refreshes every hour</div>
    </div>
    <div class="header-right">
      <div class="status-row">
        <div class="dot" id="sdot"></div>
        <span class="st-txt" id="stxt">Loading...</span>
      </div>
      <button class="refresh-btn" onclick="fetchAll()">Refresh</button>
    </div>
  </div>

  <div class="gauges-row">
    <div class="card">
      <div class="card-label">Compaction</div>
      <div class="gauge-wrap"><svg id="g-compaction" viewBox="0 0 180 110" width="100%"></svg></div>
      <div class="gauge-val" id="v-compaction"><span class="skeleton"></span></div>
    </div>
    <div class="card">
      <div class="card-label">Density</div>
      <div class="gauge-wrap"><svg id="g-density" viewBox="0 0 180 110" width="100%"></svg></div>
      <div class="gauge-val" id="v-density"><span class="skeleton"></span></div>
    </div>
    <div class="card">
      <div class="card-label">Soil</div>
      <div class="gauge-wrap"><svg id="g-soil" viewBox="0 0 180 110" width="100%"></svg></div>
      <div class="gauge-val" id="v-soil"><span class="skeleton"></span></div>
    </div>
    <div class="card">
      <div class="card-label">MTD Soil</div>
      <div class="gauge-wrap"><svg id="g-mtdsoil" viewBox="0 0 180 110" width="100%"></svg></div>
      <div class="gauge-val" id="v-mtdsoil"><span class="skeleton"></span></div>
    </div>
  </div>

  <div class="bottom-row">

    <!-- NDCR Load card with chart -->
    <div class="info-card">
      <div class="info-left">
        <div class="info-label">Load</div>
        <div class="info-val" id="v-ndcr"><span class="skeleton"></span></div>
        <div class="info-unit" id="u-ndcr">Current</div>
      </div>
      <div class="info-right">
        <div class="chart-title" id="chart-title">Today from 06:00AM</div>
        <div id="ndcr-chart-wrap">
          <!-- SVG chart rendered here -->
        </div>
      </div>
    </div>

    <div class="date-card">
      <div class="info-label" style="color:#2a5a7a;">Reporting Date</div>
      <div class="date-val" id="v-date"><span class="skeleton"></span></div>
      <div class="info-unit" style="margin-top:0.8vh;font-size:1.1vw;color:#2a5a7a;"></div>
    </div>

  </div>

</div>
</div>

<script>
  /* ── Config ── */
  const CONFIG = {
    ACCESS_CODE:   "MRL2025",
    SESSION_KEY:   "mrl_unlocked",
    GITHUB_RAW:    "https://raw.githubusercontent.com/MRLKPI/MRL-Dashboard/main/data.txt",
    BLYNK_LOG_CSV: "https://raw.githubusercontent.com/MRLKPI/MRL-Dashboard/main/data/blynk_log.csv",
  };

  /* ── Password gate ── */
  function checkPassword() {
    const val = document.getElementById("pw-input").value.trim();
    if (val === CONFIG.ACCESS_CODE) {
      sessionStorage.setItem(CONFIG.SESSION_KEY, "1");
      unlock();
    } else {
      const input = document.getElementById("pw-input");
      const err   = document.getElementById("lock-error");
      err.textContent = "Incorrect access code. Please try again.";
      input.classList.add("error");
      input.value = "";
      setTimeout(() => input.classList.remove("error"), 400);
    }
  }

  function unlock() {
    document.getElementById("lock-screen").style.display = "none";
    document.getElementById("dashboard").style.display  = "block";
    fetchAll();
  }

  document.getElementById("pw-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkPassword();
  });

  if (sessionStorage.getItem(CONFIG.SESSION_KEY) === "1") {
    unlock();
  }

  /* ── Gauge helpers ── */
  function describeArc(cx, cy, r, startDeg, endDeg) {
    const toR = d => d * Math.PI / 180;
    const x1 = cx + r * Math.cos(toR(startDeg)), y1 = cy + r * Math.sin(toR(startDeg));
    const x2 = cx + r * Math.cos(toR(endDeg)),   y2 = cy + r * Math.sin(toR(endDeg));
    const large = (endDeg - startDeg + 360) % 360 > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
  }

  function drawGauge(svgId, value, segments, rawMax) {
    const svg = document.getElementById(svgId);
    svg.innerHTML = "";
    const ns = "http://www.w3.org/2000/svg";
    const cx = 90, cy = 95, r = 72;

    function mkPath(d, stroke, sw) {
      const p = document.createElementNS(ns, "path");
      p.setAttribute("d", d); p.setAttribute("fill", "none");
      p.setAttribute("stroke", stroke); p.setAttribute("stroke-width", sw);
      p.setAttribute("stroke-linecap", "butt");
      return p;
    }

    svg.appendChild(mkPath(describeArc(cx, cy, r, 180, 360), "#a8a8a8", 16));

    segments.forEach(seg => {
      const s = 180 + (seg.from / rawMax) * 180;
      const e = 180 + (seg.to / rawMax) * 180;
      if (Math.abs(e - s) < 0.1) return;
      svg.appendChild(mkPath(describeArc(cx, cy, r, s, e), seg.color, 16));
    });

    const norm = Math.max(0, Math.min(value, rawMax)) / rawMax;
    const needleDeg = 180 + norm * 180;
    const nRad = needleDeg * Math.PI / 180;
    const nx = cx + 62 * Math.cos(nRad), ny = cy + 62 * Math.sin(nRad);
    const bx = cx + 10 * Math.cos(nRad + Math.PI), by = cy + 10 * Math.sin(nRad + Math.PI);

    const needle = document.createElementNS(ns, "line");
    needle.setAttribute("x1", bx); needle.setAttribute("y1", by);
    needle.setAttribute("x2", nx); needle.setAttribute("y2", ny);
    needle.setAttribute("stroke", "#1a1a1a"); needle.setAttribute("stroke-width", "3");
    needle.setAttribute("stroke-linecap", "round");
    svg.appendChild(needle);

    const hub = document.createElementNS(ns, "circle");
    hub.setAttribute("cx", cx); hub.setAttribute("cy", cy);
    hub.setAttribute("r", "6"); hub.setAttribute("fill", "#1a1a1a");
    svg.appendChild(hub);

    const mn = document.createElementNS(ns, "text");
    mn.setAttribute("x", "15"); mn.setAttribute("y", "108");
    mn.setAttribute("font-size", "11"); mn.setAttribute("fill", "#666");
    mn.setAttribute("text-anchor", "middle"); mn.textContent = "0";
    svg.appendChild(mn);

    const mx = document.createElementNS(ns, "text");
    mx.setAttribute("x", "165"); mx.setAttribute("y", "108");
    mx.setAttribute("font-size", "11"); mx.setAttribute("fill", "#666");
    mx.setAttribute("text-anchor", "middle"); mx.textContent = rawMax;
    svg.appendChild(mx);
  }

  const COMPACTION_SEGS = [
    { from: 0,   to: 0.7, color: "#E24B4A" },
    { from: 0.7, to: 0.9, color: "#EF9F27" },
    { from: 0.9, to: 1,   color: "#639922" },
  ];
  const DENSITY_SEGS = [
    { from: 0,    to: 0.7,  color: "#E24B4A" },
    { from: 0.7,  to: 0.79, color: "#EF9F27" },
    { from: 0.79, to: 1,    color: "#639922" },
  ];
  const SOIL_SEGS = [
    { from: 0,  to: 10,  color: "#639922" },
    { from: 10, to: 15,  color: "#EF9F27" },
    { from: 15, to: 100, color: "#E24B4A" },
  ];
  const MTDSOIL_SEGS = [
    { from: 0,   to: 100, color: "#639922" },
    { from: 100, to: 200, color: "#E24B4A" },
  ];

  function renderCard(id, val, segs, rawMax, display) {
    drawGauge("g-" + id, val, segs, rawMax);
    document.getElementById("v-" + id).textContent = display;
  }

  function setStatus(ok, msg) {
    document.getElementById("sdot").className = "dot" + (ok ? "" : " err");
    document.getElementById("stxt").textContent = msg;
  }

  /* ── Parse blynk_log.csv ──
     Expected format:
       Time,Value
       2026-05-26T20:09:01 AEST,4
       ...
     Returns array of { ts: Date, value: number }
  */
  function parseBlynkCSV(text) {
    const lines = text.trim().split("\n");
    const rows = [];
    // skip header row
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const commaIdx = line.lastIndexOf(",");
      if (commaIdx < 0) continue;
      const timeStr = line.slice(0, commaIdx).trim();
      const valStr  = line.slice(commaIdx + 1).trim();
      // Remove timezone label (e.g. " AEST") so Date can parse it
      const cleanTime = timeStr.replace(/\s+[A-Z]{2,5}$/, "");
      const ts = new Date(cleanTime);
      const value = parseFloat(valStr);
      if (isNaN(ts.getTime()) || isNaN(value)) continue;
      rows.push({ ts, value });
    }
    return rows;
  }

  /* ── Filter today's rows from 05:45 local time ── */
  function filterTodayFrom0545(rows) {
    const now = new Date();
    // Build today's 05:45:00 in local time
    const cutoff = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 5, 45, 0);
    return rows.filter(r => r.ts >= cutoff && r.ts.toDateString() === now.toDateString());
  }

  /* ── Draw SVG line chart ── */
  function drawLineChart(containerId, rows) {
    const wrap = document.getElementById(containerId);
    wrap.innerHTML = "";

    if (!rows || rows.length === 0) {
      const div = document.createElement("div");
      div.className = "chart-no-data";
      div.textContent = "No data from 05:45 today";
      wrap.appendChild(div);
      return;
    }

    const W = wrap.clientWidth  || 260;
    const H = wrap.clientHeight || 80;
    const PAD = { top: 8, right: 8, bottom: 22, left: 28 };
    const cW = W - PAD.left - PAD.right;
    const cH = H - PAD.top  - PAD.bottom;

    const ns = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(ns, "svg");
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    svg.setAttribute("width",  W);
    svg.setAttribute("height", H);
    svg.style.display = "block";
    svg.style.overflow = "visible";

    const times  = rows.map(r => r.ts.getTime());
    const values = rows.map(r => r.value);
    const tMin = Math.min(...times),  tMax = Math.max(...times);
    const vMin = Math.min(...values), vMax = Math.max(...values);
    const vRange = vMax === vMin ? 1 : vMax - vMin;
    const tRange = tMax === tMin ? 1 : tMax - tMin;

    function xOf(t) { return PAD.left + ((t - tMin) / tRange) * cW; }
    function yOf(v) { return PAD.top  + cH - ((v - vMin) / vRange) * cH; }

    // Grid lines (3 horizontal)
    for (let i = 0; i <= 2; i++) {
      const yv = vMin + (vRange * i / 2);
      const yp = yOf(yv);
      const gl = document.createElementNS(ns, "line");
      gl.setAttribute("x1", PAD.left); gl.setAttribute("y1", yp);
      gl.setAttribute("x2", PAD.left + cW); gl.setAttribute("y2", yp);
      gl.setAttribute("stroke", "#999"); gl.setAttribute("stroke-width", "0.5");
      gl.setAttribute("stroke-dasharray", "3,3");
      svg.appendChild(gl);

      // Y-axis labels
      const yt = document.createElementNS(ns, "text");
      yt.setAttribute("x", PAD.left - 4); yt.setAttribute("y", yp + 4);
      yt.setAttribute("font-size", "9"); yt.setAttribute("fill", "#555");
      yt.setAttribute("text-anchor", "end"); yt.setAttribute("font-family", "Inter, sans-serif");
      yt.textContent = Math.round(yv);
      svg.appendChild(yt);
    }

    // X-axis time labels (first and last)
    function fmtTime(d) {
      return d.toLocaleTimeString("en-AU", { hour: "2-digit", minute: "2-digit", hour12: false });
    }
    const x0 = rows[0].ts, x1 = rows[rows.length - 1].ts;
    [[x0, PAD.left, "start"], [x1, PAD.left + cW, "end"]].forEach(([d, xp, anchor]) => {
      const xt = document.createElementNS(ns, "text");
      xt.setAttribute("x", xp); xt.setAttribute("y", H - 4);
      xt.setAttribute("font-size", "9"); xt.setAttribute("fill", "#555");
      xt.setAttribute("text-anchor", anchor); xt.setAttribute("font-family", "Inter, sans-serif");
      xt.textContent = fmtTime(d);
      svg.appendChild(xt);
    });

    // Filled area under line
    if (rows.length > 1) {
      let areaD = `M ${xOf(times[0])} ${PAD.top + cH}`;
      areaD += ` L ${xOf(times[0])} ${yOf(values[0])}`;
      for (let i = 1; i < rows.length; i++) {
        areaD += ` L ${xOf(times[i])} ${yOf(values[i])}`;
      }
      areaD += ` L ${xOf(times[times.length - 1])} ${PAD.top + cH} Z`;
      const area = document.createElementNS(ns, "path");
      area.setAttribute("d", areaD);
      area.setAttribute("fill", "rgba(13,42,64,0.12)");
      area.setAttribute("stroke", "none");
      svg.appendChild(area);
    }

    // Line
    if (rows.length > 1) {
      let lineD = `M ${xOf(times[0])} ${yOf(values[0])}`;
      for (let i = 1; i < rows.length; i++) {
        lineD += ` L ${xOf(times[i])} ${yOf(values[i])}`;
      }
      const linePath = document.createElementNS(ns, "path");
      linePath.setAttribute("d", lineD);
      linePath.setAttribute("fill", "none");
      linePath.setAttribute("stroke", "#0d2a40");
      linePath.setAttribute("stroke-width", "1.8");
      linePath.setAttribute("stroke-linejoin", "round");
      linePath.setAttribute("stroke-linecap", "round");
      svg.appendChild(linePath);
    }

    // Dots
    rows.forEach((r, i) => {
      const cx = xOf(times[i]), cy = yOf(values[i]);
      const dot = document.createElementNS(ns, "circle");
      dot.setAttribute("cx", cx); dot.setAttribute("cy", cy);
      dot.setAttribute("r", rows.length > 40 ? "1.5" : "3");
      dot.setAttribute("fill", "#0d2a40");
      svg.appendChild(dot);
    });

    // Latest value dot highlight
    const lx = xOf(times[times.length - 1]), ly = yOf(values[values.length - 1]);
    const hl = document.createElementNS(ns, "circle");
    hl.setAttribute("cx", lx); hl.setAttribute("cy", ly);
    hl.setAttribute("r", "4.5");
    hl.setAttribute("fill", "#E24B4A");
    hl.setAttribute("stroke", "#fff");
    hl.setAttribute("stroke-width", "1.5");
    svg.appendChild(hl);

    wrap.appendChild(svg);
  }

  /* ── Fetch data.txt from GitHub ── */
  async function fetchData() {
    const res = await fetch(CONFIG.GITHUB_RAW + "?t=" + Date.now());
    if (!res.ok) throw new Error("Failed to fetch data.txt");
    const text = await res.text();
    const data = {};
    text.split("\n").forEach(line => {
      const idx = line.indexOf(",");
      if (idx < 0) return;
      data[line.slice(0, idx).trim().toLowerCase()] = line.slice(idx + 1).trim();
    });
    return data;
  }

  /* ── Fetch blynk_log.csv from GitHub ── */
  async function fetchBlynkCSV() {
    const res = await fetch(CONFIG.BLYNK_LOG_CSV + "?t=" + Date.now());
    if (!res.ok) throw new Error("blynk_log.csv fetch failed");
    return res.text();
  }

  /* ── Main fetch ── */
  async function fetchAll() {
    setStatus(true, "Fetching...");
    const now = new Date().toLocaleTimeString("en-AU", { hour: "2-digit", minute: "2-digit" });
    const [dataRes, csvRes] = await Promise.allSettled([fetchData(), fetchBlynkCSV()]);

    // ── Gauge data ──
    if (dataRes.status === "fulfilled" && dataRes.value) {
      const d = dataRes.value;
      if (d.compaction) { const v = parseFloat(d.compaction); renderCard("compaction", v, COMPACTION_SEGS, 1,   v.toFixed(2)); }
      if (d.density)    { const v = parseFloat(d.density);    renderCard("density",    v, DENSITY_SEGS,    1,   v.toFixed(2)); }
      if (d.soil)       { const v = parseFloat(d.soil);       renderCard("soil",       v, SOIL_SEGS,     100,   v.toFixed(1)); }
      if (d.mtdsoil)    { const v = parseFloat(d.mtdsoil);    renderCard("mtdsoil",    v, MTDSOIL_SEGS,  200,   v.toFixed(1)); }
      if (d.date) document.getElementById("v-date").textContent = d.date;
    }

    // ── NDCR Load from CSV ──
    if (csvRes.status === "fulfilled") {
      const allRows  = parseBlynkCSV(csvRes.value);
      const todayRows = filterTodayFrom0545(allRows);

      if (allRows.length > 0) {
        // Latest value = last row in the full file
        const last = allRows[allRows.length - 1];
        const bv = last.value;
        document.getElementById("v-ndcr").textContent = isNaN(bv) ? "—" : Math.round(bv).toString();
        document.getElementById("u-ndcr").textContent = "NOW";
      } else {
        document.getElementById("v-ndcr").textContent = "—";
        document.getElementById("u-ndcr").textContent = "no data";
      }

      // Draw the chart with today's data from 05:45
      drawLineChart("ndcr-chart-wrap", todayRows);

      const label = todayRows.length > 0
        ? `Today from 05:45 (${todayRows.length} pts)`
        : "Today from 05:45";
      document.getElementById("chart-title").textContent = label;

    } else {
      document.getElementById("v-ndcr").textContent = "—";
      document.getElementById("u-ndcr").textContent = "unavailable";
      drawLineChart("ndcr-chart-wrap", []);
    }

    const bothOk = dataRes.status === "fulfilled" && csvRes.status === "fulfilled";
    setStatus(bothOk, bothOk ? "Updated " + now : "Partial update " + now);
  }

  // Auto-refresh every hour
  setInterval(fetchAll, 60 * 60 * 1000);
</script>
